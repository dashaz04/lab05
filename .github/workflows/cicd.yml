name: test

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [g++]

    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev libgmock-dev lcov g++

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} -DCMAKE_BUILD_TYPE=Debug
          cmake --build build

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure
        
      - name: Generate Coverage
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --rc lcov_branch_coverage=1 || true
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/build/*' \
            --output-file coverage_final.info || true

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage_final.info
