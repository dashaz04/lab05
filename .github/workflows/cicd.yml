name: C++ Coverage

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov libgtest-dev libgmock-dev cmake

    - name: Configure and Build
      run: |
        cmake -S . -B build
        cmake --build build

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure

    - name: Collect Coverage
      run: |
        lcov --directory . --capture --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '${{ github.workspace }}/tests/*' --output-file coverage.info

    - name: Coveralls
      uses: coverallsapp/github-action@v2
      with:
        file: coverage.info
